<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCm7PLUQgVc1u_3uVzbbkMRCwSmDRep7dM",
    authDomain: "planificateurhauteur.firebaseapp.com",
    projectId: "planificateurhauteur",
    storageBucket: "planificateurhauteur.firebasestorage.app",
    messagingSenderId: "919656985826",
    appId: "1:919656985826:web:26697356cfc0b89b759abb"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const DOC_ID = 'coach_data';
  const COL = 'app';

  let _fbSaveTimer = null;
  let _ignoreNext = false;

  // Expose Firebase helpers globalement
  window.fbSave = async function(data) {
    clearTimeout(_fbSaveTimer);
    _fbSaveTimer = setTimeout(async () => {
      try {
        // On sépare imgs (trop volumineux) du reste
        const { imgs, ...rest } = data;
        await setDoc(doc(db, COL, DOC_ID), rest);
        await setDoc(doc(db, COL, DOC_ID + '_imgs'), { imgs });
        window._fbStatus = 'synced';
        document.getElementById('fb-status')?.setAttribute('data-status','synced');
      } catch(e) {
        console.warn('Firebase save error:', e);
        window._fbStatus = 'error';
        document.getElementById('fb-status')?.setAttribute('data-status','error');
      }
    }, 800);
  };

  window.fbLoad = async function() {
    try {
      const snap = await getDoc(doc(db, COL, DOC_ID));
      const snapImgs = await getDoc(doc(db, COL, DOC_ID + '_imgs'));
      if (snap.exists()) {
        const data = { ...snap.data(), ...(snapImgs.exists() ? snapImgs.data() : {}) };
        return data;
      }
    } catch(e) { console.warn('Firebase load error:', e); }
    return null;
  };

  // Écoute les changements en temps réel (sync multi-device)
  window.fbListen = function(callback) {
    onSnapshot(doc(db, COL, DOC_ID), (snap) => {
      if (snap.exists() && !_ignoreNext) {
        callback(snap.data());
      }
      _ignoreNext = false;
    });
  };

  window._fbReady = true;
  document.dispatchEvent(new Event('fbReady'));
</script>

function buildDD(){
  const data={};let mon=monOf(CAL_START);
  WPLAN.forEach((wp,wi)=>{for(let d=0;d<7;d++){const k=iso(addD(mon,wi*7+d));data[k]={phase:wp.p,hasSession:wp.s.includes(d+1),notes:wp.n,weekIdx:wi};}});
  return data;
}

function rDashboard(){

  const curIso=iso(monCur);
  const ddCur=S.dd[curIso]||{};
  const phCur=ddCur.phase||'';
  const phInfo=PH[phCur]||{};

  // Prochaine compét
  const allKeys=Object.keys(S.dd).sort();
  const todayStr=TODAY;
  let nextComp=null;
  for(const k of allKeys){if(k>=todayStr&&S.dd[k].phase==='comp'&&S.dd[k].hasSession){nextComp=k;break;}}

  // Séances cette semaine (calendrier réel)
  const weekDates=Array.from({length:7},(_,i)=>iso(addD(monCur,i)));
  const sesSemaine=S.sessions.filter(s=>weekDates.includes(s.date));

  // Stats globales
  const totalSes=S.sessions.length;
  const totalAt=S.athletes.length;
  const byPh={ppg:0,ppo:0,pps:0,comp:0,rest:0};
  Object.values(S.dd).forEach(d=>{if(d.phase&&byPh[d.phase]!==undefined){byPh[d.phase]++;} });
  const totalWks=Object.keys(S.dd).filter((k,i,a)=>i===0||S.dd[k].weekIdx!==S.dd[a[i-1]].weekIdx).length;

  // Barre de progression saison
  const allWkKeys=Object.keys(S.dd).sort();
  const firstWk=allWkKeys[0];const lastWk=allWkKeys[allWkKeys.length-1];
  const totalDays=(new Date(lastWk)-new Date(firstWk))/(1000*86400)||1;
  const elapsed=Math.min(Math.max((todayDate-new Date(firstWk))/(1000*86400),0),totalDays);
  const pctSaison=Math.round(elapsed/totalDays*100);

  // Charge de la semaine courante
  const ddWkEntries=Object.values(S.dd).filter(d=>d.weekIdx===ddCur.weekIdx);
  const nbJoursSes=ddWkEntries.filter(d=>d.hasSession).length;

  // 5 prochaines séances planifiées
  const upcomingSes=[...S.sessions].filter(s=>s.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);

  // Phase actuelle détails

    const weeks=Object.values(S.dd).filter((d,i,a)=>d.phase===p&&(i===0||a[i-1].weekIdx!==d.weekIdx)).length;
    return{p,weeks};

      const k=iso(d);const s=S.sessions.find(x=>x.date===k);const ph=s?PH[s.phase]:null;

// ── CALENDRIER ────────────────────────────────────────────────────
function rCal(){
  const allD=Object.keys(S.dd2).sort();
  const segs=allD.map(k=>{const d=S.dd2[k];const col=d&&PH[d.phase]?PH[d.phase].col:'#333';return`<div class="ps" style="flex:1;background:${col}"></div>`;}).join('');
  const c=countPhD(S.dd2);
  const calMs=buildCalMs(S.dd2);
  const dayMod=S.modal==='editDay'?rDayMod():'';
  // Calcul numero semaine ISO
  function isoWeek(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);const w=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7);}
  return`${dayMod}<div class="ph">
    <div class="pt">Calendrier de saison</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${['ppg','ppo','pps','comp','rest'].map(p=>bdg(p)).join('')}</div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sv">${WPLAN.length}</div><div class="sl2">Semaines</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppg)">${c.ppg}</div><div class="sl2">PPG</div></div>
    <div class="sc"><div class="sv" style="color:var(--ppo)">${c.ppo}</div><div class="sl2">PPO</div></div>
    <div class="sc"><div class="sv" style="color:var(--pps)">${c.pps}</div><div class="sl2">PPS</div></div>
  </div>
  <div class="pb">${segs}</div>
  ${calMs.map(m=>{
    const fd=new Date(m.y,m.m,1).getDay();const off=fd===0?6:fd-1;
    const dim=new Date(m.y,m.m+1,0).getDate();
    let cells='';
    // En-têtes jours
    // Semaines avec numéro
    let day=1;
    let rows='';
    let curDay=new Date(m.y,m.m,1);
    // Cellules vides de début
    let emptyCells='';
    for(let i=0;i<off;i++) emptyCells+=`<div class="cd cd-emp"></div>`;
    // Toutes les cellules du mois
    let allCells=emptyCells;
    for(let d=1;d<=dim;d++){
      const k=iso(new Date(m.y,m.m,d));const dd=S.dd2[k];const ph=dd?PH[dd.phase]:null;
      const realSes=S.sessions.filter(x=>x.date===k);
      const sesPh=realSes.length?PH[realSes[0].phase]:null;
      const dispPh=sesPh||ph;
      // Numéro semaine ISO (affiché le lundi)
      const dt=new Date(m.y,m.m,d);
      const isMonday=dt.getDay()===1;
      const wkNum=isMonday?`<div style="position:absolute;top:1px;right:2px;font-size:8px;font-weight:700;color:var(--text3);opacity:.6">S${isoWeek(k)}</div>`:'';
      allCells+=`<div class="cd${sesPh?' cd-'+realSes[0].phase:ph?' cd-'+dd.phase:''}${k===TODAY?' today':''}" ${dd?`data-editday="${k}"`:''}style="min-height:54px;position:relative">
        ${wkNum}
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="font-size:12px;font-weight:600;color:${dispPh?dispPh.col:'var(--text3)'}">${d}</div>
          ${ph&&dd.phase?`<button class="del-day-btn" data-delday="${k}" style="font-size:11px;background:none;border:none;cursor:pointer;color:${ph?ph.col:'#aaa'};line-height:1;padding:0;opacity:0.5" title="Effacer">x</button>`:''}
        </div>
        ${dispPh&&(sesPh||dd.phase)?`<div style="font-size:9px;font-weight:700;color:${dispPh.col};margin-top:1px">${dispPh.l}</div>`:''}
        ${realSes.length?`<div style="font-size:9px;color:${sesPh?sesPh.col:'#888'};margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer" onclick="event.stopPropagation();S.page='seances';S.selSes=${realSes[0].id};R()" title="${realSes[0].title}">${realSes[0].title.substring(0,10)}${realSes[0].title.length>10?'…':''}</div>`:''}
        ${realSes.length&&realSes[0].intensite?`<div style="font-size:9px;line-height:1;margin-top:1px">${stars(realSes[0].intensite,sesPh?sesPh.col:'#E8C030')}</div>`:(!realSes.length&&dd&&dd.intensite)?`<div style="font-size:9px;line-height:1;margin-top:2px">${stars(dd.intensite,ph?ph.col:'#E8C030')}</div>`:realSes.length?`<div class="dot" style="background:${sesPh?sesPh.col:'#888'}"></div>`:''}
      </div>`;
    }
    return`<div class="mb">
      <div class="mt2" style="cursor:default">${MOIS[m.m]} ${m.y}</div>
      <div class="cg">${JOURS.map(j=>`<div class="ch">${j}</div>`).join('')}${allCells}</div>
    </div>`;
  }).join('')}`;
}

function buildWeeks(){const ws=[];let mon=monOf(CAL_START);const end=new Date('2026-09-01');let wn=1;while(mon<end){ws.push({id:iso(mon),wn,mon:new Date(mon)});mon=addD(mon,7);wn++;}return ws;}
function groupMonths(weeks){const ms=[];let cur=null;weeks.forEach(w=>{const m=w.mon.getMonth(),y=w.mon.getFullYear(),k=`${y}-${m}`;if(!cur||cur.key!==k){cur={key:k,label:w.mon.toLocaleDateString('fr-BE',{month:'long',year:'numeric'}),weeks:[]};ms.push(cur);}cur.weeks.push(w);});return ms;}
function buildCalMs(dd){const ms=[];let cur=null;Object.keys(dd).sort().forEach(k=>{const d=new Date(k+'T12:00:00'),m=d.getMonth(),y=d.getFullYear(),key=`${y}-${m}`;if(!cur||cur.key!==key){cur={key,y,m};ms.push(cur);}});return ms;}
function countPh(weeks,dd){const c={ppg:0,ppo:0,pps:0,comp:0,rest:0};const seen=new Set();weeks.forEach(w=>{const d=dd[iso(w.mon)];if(d&&!seen.has(d.weekIdx)){seen.add(d.weekIdx);if(c[d.phase]!==undefined)c[d.phase]++;}});return c;}
function countPhD(dd){const c={ppg:0,ppo:0,pps:0,comp:0,rest:0};const seen=new Set();Object.values(dd).forEach(d=>{if(!seen.has(d.weekIdx)){seen.add(d.weekIdx);if(c[d.phase]!==undefined)c[d.phase]++;}});return c;}
function getPrs(){const w=document.getElementById('prs-wrap');if(!w) return[];const rows=w.querySelectorAll('.fgr');const prs=[];rows.forEach((_,i)=>{const l=document.getElementById(`prl-${i}`);const vv=document.getElementById(`prv-${i}`);if(l&&vv&&l.value.trim()) prs.push({label:l.value.trim(),val:vv.value.trim()});});return prs;}
function addPrRow(){const w=document.getElementById('prs-wrap');if(!w) return;const i=w.querySelectorAll('.fgr').length;const d=document.createElement('div');d.className='fgr';d.style.marginBottom='8px';d.innerHTML=`<input id="prl-${i}" placeholder="Label"/><input id="prv-${i}" placeholder="1m80"/>`;w.appendChild(d);}


function getYtId(url){
  if(!url) return null;
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}
function getEmbedUrl(url){
  if(!url) return null;
  const ytId=getYtId(url);
  if(ytId) return `https://www.youtube.com/embed/${ytId}?rel=0`;
  const vi=url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(vi) return `https://player.vimeo.com/video/${vi[1]}`;
  return null;
}
function getThumb(url){
  const ytId=getYtId(url);
  if(ytId) return `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
  return null;
}
function isDirectVideo(url){
  return url&&/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url);
}

    ${tab==='auto'?autoContent:tab==='embed'?embedContent:uploadContent}
  </div></div>`;
}

  const pdfUrl='data:application/pdf;base64,'+pdfB64;
  const xlsxUrl='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+xlsxB64;
  const tab=S.mData.resTab||'docs';
  
  // ── BASE DOC
  const docFilter=S.mData.docFilter||'';
  const docSearch=(S.mData.docSearch||'').toLowerCase();
  const filteredDocs=S.docs.filter(d=>{
    if(docFilter&&d.cat!==docFilter) return false;
    if(docSearch&&!d.title.toLowerCase().includes(docSearch)&&!d.desc.toLowerCase().includes(docSearch)) return false;

  function rDocTab(){
    const typeIco={pdf:'📄',img:'🖼️',vid:'▶️',txt:'📝'};
    const typeLabel={pdf:'PDF',img:'Image',vid:'Vidéo',txt:'Fiche texte'};
    return`
    <!-- Barre de recherche + filtres -->
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <div style="position:relative;flex:1;min-width:180px">
        <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)">🔍</span>
        <input id="doc-search" type="text" placeholder="Rechercher une ressource…" value="${S.mData.docSearch||''}"
          style="width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);font-size:13px;color:var(--text);outline:none;box-sizing:border-box">
      </div>
      <button class="btn btn-p" id="btn-add-doc" style="padding:9px 16px;font-size:13px;flex-shrink:0">+ Ajouter</button>
      <button class="btn" id="btn-manage-cats" style="padding:9px 14px;font-size:13px;flex-shrink:0">⚙ Catégories</button>
    </div>

    <!-- Filtres catégories -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px">
      <button class="tab${!docFilter?' on':''}" data-docfilter="" style="font-size:12px;padding:5px 12px">Tout (${S.docs.length})</button>
      ${S.docCats.map(cat=>{const n=S.docs.filter(d=>d.cat===cat).length;return`<button class="tab${docFilter===cat?' on':''}" data-docfilter="${cat}" style="font-size:12px;padding:5px 12px">${cat} (${n})</button>`;}).join('')}
    </div>

    <!-- Grille de documents -->
    ${filteredDocs.length===0?`
      <div class="card" style="text-align:center;padding:48px 24px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:14px">${S.docs.length===0?'📂':'🔎'}</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text2)">${S.docs.length===0?'Aucune ressource encore':'Aucun résultat'}</div>
        <div style="font-size:13px;max-width:300px;margin:0 auto;line-height:1.6">${S.docs.length===0?'Ajoute des PDFs, images, vidéos ou fiches texte pour construire ta base de travail.':'Essaie d\'autres mots-clés ou change le filtre.'}</div>
        ${S.docs.length===0?`<button class="btn btn-p" id="btn-add-doc2" style="margin-top:20px;padding:10px 24px">+ Ajouter une ressource</button>`:''}
      </div>
    `:`
      <div class="doc-grid">
        ${filteredDocs.map(doc=>{
          const ico=typeIco[doc.type]||'📎';
          const thumbClass=doc.type||'txt';
          const thumbContent=doc.type==='img'&&S.imgs['doc_'+doc.id]
            ?`<img src="${S.imgs['doc_'+doc.id]}" style="width:100%;height:100%;object-fit:cover">`
            :`<span style="font-size:44px">${ico}</span>`;
          return`<div class="doc-card" data-opendoc="${doc.id}">
            <div class="doc-thumb ${thumbClass}">${thumbContent}</div>
            <div class="doc-info">
              <div class="doc-title">${doc.title}</div>
              ${doc.desc?`<div class="doc-meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">${doc.desc}</div>`:''}
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px">
                <span class="doc-cat-badge">${doc.cat||'Sans catégorie'}</span>
                <span style="font-size:11px;color:var(--text3)">${typeLabel[doc.type]||'Doc'}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `}`;
  }

  function rAddDocModal(){
    const t=S.mData.docType||'pdf';
    const typeOpts=[{v:'pdf',l:'📄 PDF',d:'Télécharge un fichier PDF'},{v:'img',l:'🖼️ Image',d:'JPG, PNG, schéma technique'},{v:'vid',l:'▶️ Vidéo',d:'Lien YouTube ou Vimeo'},{v:'txt',l:'📝 Fiche texte',d:'Notes, protocole, consignes'}];
    return`<div class="ov"><div class="md" style="width:500px;max-width:95vw">
      <div style="font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text)">Ajouter une ressource</div>
      <!-- Type -->

  function rDocViewer(){
    const doc=S.docs.find(d=>d.id===S.mData.viewDocId);

    let body='';
    if(doc.type==='pdf'&&S.imgs['doc_'+doc.id]){
      body=`<iframe src="${S.imgs['doc_'+doc.id]}" style="width:100%;height:100%;border:none"></iframe>`;
    } else if(doc.type==='img'&&S.imgs['doc_'+doc.id]){
      body=`<img src="${S.imgs['doc_'+doc.id]}" style="max-width:100%;max-height:100%;object-fit:contain">`;

      let embedUrl=doc.url;
      const ytMatch=doc.url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
      const viMatch=doc.url.match(/vimeo\.com\/(\d+)/);
      if(ytMatch) embedUrl=`https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;

  function rCalcTab(){
    const athl=S.mData.calcAthl||'';
    const foulees=S.mData.calcF||5;
    const longueur=S.mData.calcL||193;
    const angle=S.mData.calcA||30;
    const xstd=S.mData.calcX||91;
    const ystd=S.mData.calcY||30;
    // Formulas from Excel: B14=B6*B5/(B7*PI()/180), B17=B9+B14*(sin-sin0), B18=B8+B14*(1-cos)
    const rayon=longueur*foulees/(angle*Math.PI/180);
    const arcLen=longueur*foulees;
    const xi=Math.round((xstd+rayon*(Math.sin(angle*Math.PI/180)-Math.sin(0)))*10)/10;
    const yi=Math.round((ystd+rayon*(1-Math.cos(angle*Math.PI/180)))*10)/10;
    const valid=xi>0&&yi>0;
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card" style="margin-bottom:0">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px">
          ✏️ Variables d&#39;entrée

        <div class="fg">
          <label>Longueur de foulée sur courbe (cm)</label>

          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
            <span>120 cm</span><strong id="calc-l-val" style="color:var(--text);font-size:14px">${longueur} cm</strong><span>230 cm</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Fém. typique: 150–180 cm · Masc. typique: 180–210 cm</div>
        </div>
        <div class="fg">
          <label>Nombre de foulées sur la courbe</label>
          <input type="range" id="calc-f" min="3" max="7" step="1" value="${foulees}" oninput="calcUpdate()" style="width:100%;margin-bottom:4px"/>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
            <span>3</span><strong id="calc-f-val" style="color:var(--text);font-size:14px">${foulees} foulées</strong><span>7</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Recommandé : 5 (optimal biomécanique)</div>
        </div>
        <div class="fg">
          <label>Angle d&#39;impulsion (degrés)</label>
          <input type="range" id="calc-a" min="10" max="40" value="${angle}" oninput="calcUpdate()" style="width:100%;margin-bottom:4px"/>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
            <span>10°</span><strong id="calc-a-val" style="color:var(--text);font-size:14px">${angle}°</strong><span>40°</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Recommandé : 15–30° (jamais 0° !</div>
        </div>
        <div class="fg-row">
          <div class="fg">
            <label>XSTD — dist. pied / standard (cm)</label>
            <input type="number" id="calc-x" value="${xstd}" min="0" max="200" oninput="calcUpdate()" style="font-size:16px;font-weight:700"/>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Fém: 30–50 · Masc: 50–75</div>
          </div>
          <div class="fg">
            <label>YSTD — dist. perp. / barre (cm)</label>
            <input type="number" id="calc-y" value="${ystd}" min="0" max="200" oninput="calcUpdate()" style="font-size:16px;font-weight:700"/>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Fém: 75–90 · Masc: 90–110</div>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card" style="margin-bottom:0;background:var(--ppg-bg);border-color:var(--ppg-bd)">
          <div style="font-size:14px;font-weight:700;color:var(--ppg-tx);margin-bottom:16px">📍 Point d&#39;Inflexion <span id="calc-result-name">${athl?'&#8212; '+athl:''}</span></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
            <div style="background:#fff;border-radius:10px;padding:16px;text-align:center;border:1px solid var(--ppg-bd)">
              <div style="font-size:11px;color:var(--ppg-tx);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">X — depuis le standard</div>
              <div id="calc-result" style="font-size:36px;font-weight:700;color:var(--ppg)">${valid?xi+'':'-'}</div>
              <div style="font-size:12px;color:var(--ppg-tx);margin-top:2px">cm (parallèle à la barre)</div>
            </div>
            <div style="background:#fff;border-radius:10px;padding:16px;text-align:center;border:1px solid var(--ppg-bd)">
              <div style="font-size:11px;color:var(--ppg-tx);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Y — perpendiculaire</div>
              <div id="calc-result-y" style="font-size:36px;font-weight:700;color:var(--ppg)">${valid?yi+'':'-'}</div>
              <div style="font-size:12px;color:var(--ppg-tx);margin-top:2px">cm (vers l&#39;extérieur)</div>

function saveSession(){
  const t=document.getElementById('ns-t')?.value.trim();if(!t) return;
  const baseDate=document.getElementById('ns-d')?.value||iso(new Date());
  const p=document.getElementById('ns-p')?.value||'ppg';
  const n=document.getElementById('ns-n')?.value||'';
  const hd=document.getElementById('ns-hd')?.value||'';
  const hf=document.getElementById('ns-hf')?.value||'';
  const iv=S.mData.starVal||0;
  const repeatDays=S.mData.repeatDays||[];
  S.sessions.push({id:S.nSId,date:baseDate,title:t,phase:p,notes:n,intensite:iv,heureDebut:hd,heureFin:hf,exercises:[]});
  S.nSId++;
  if(repeatDays.length>0){
    const base=new Date(baseDate+'T12:00:00');
    const baseDow=base.getDay()===0?7:base.getDay();
    const weekMon=new Date(base);weekMon.setDate(base.getDate()-(baseDow-1));
    repeatDays.forEach(dow=>{
      if(dow===baseDow) return;
      const d2=new Date(weekMon);d2.setDate(weekMon.getDate()+(dow-1));
      S.sessions.push({id:S.nSId,date:iso(d2),title:t,phase:p,notes:n,intensite:iv,exercises:[]});
      S.nSId++;
    });
  }
  S.mData.repeatDays=[];S.mData.starVal=0;
  S.modal=null;save();R();
}
function cancelSession(){S.modal=null;S.mData.starVal=0;S.mData.repeatDays=[];R();}
function toggleRepeatDay(day){
  const rd=S.mData.repeatDays||[];
  const idx=rd.indexOf(day);
  if(idx>=0) rd.splice(idx,1); else rd.push(day);
  S.mData.repeatDays=[...rd];
  document.querySelectorAll('.day-repeat-btn').forEach(b=>{
    const d=parseInt(b.dataset.day);
    const on=S.mData.repeatDays.includes(d);
    b.style.border='1.5px solid '+(on?'var(--blue)':'var(--border2)');
    b.style.background=on?'var(--blue)':'var(--bg3)';
    b.style.color=on?'#fff':'var(--text2)';
  });
}

function dragSession(event, sid){
  event.dataTransfer.setData('text/plain', String(sid));
  event.dataTransfer.effectAllowed='move';
}
function dropSession(event, targetDate){
  event.preventDefault();
  const sid=parseInt(event.dataTransfer.getData('text/plain'));
  if(!sid||!targetDate) return;
  // Check no session already on target date
  const existing=S.sessions.find(x=>x.date===targetDate&&x.id!==sid);
  if(existing){
    if(!confirm('Il y a déjà une séance ce jour. Remplacer ?')) return;
    S.sessions=S.sessions.filter(x=>x.id!==existing.id);
  }
  S.sessions=S.sessions.map(x=>x.id===sid?{...x,date:targetDate}:x);
  save();R();
}

let _timerState={};
let _timerStopped={}; // garde le temps affiché après arrêt

function startExTimer(sid, exId, dureeMin){
  const key=sid+'_'+exId;

  // Si timer en cours → STOP et garde le temps
  if(_timerState[key]){
    clearInterval(_timerState[key].interval);
    const elapsed=_timerState[key].elapsed;
    delete _timerState[key];
    const m=Math.floor(elapsed/60),sc=elapsed%60;
    const label=`${m}:${sc.toString().padStart(2,'0')}`;
    _timerStopped[key]={elapsed,label};
    const btn=document.getElementById('timer-btn-'+exId);
    if(btn){
      btn.style.borderColor='#E8A030';
      btn.style.background='rgba(232,160,48,.1)';
      btn.style.fontSize='11px';
      btn.style.fontWeight='700';
      btn.style.color='#E8A030';
      btn.textContent=label;
      btn.title='Temps écoulé : '+label+' — tap pour sauver en biblio';
    }
    // Afficher le bouton save-durée
    const saveBtn=document.getElementById('timer-save-'+exId);
    if(saveBtn){saveBtn.style.display='';}
    return;
  }

  // Si timer stoppé (affiche le temps) → proposer de sauver la durée
  if(_timerStopped[key]){
    const mins=Math.ceil(_timerStopped[key].elapsed/60);
    if(confirm(`Sauver ${mins} min comme durée de cet exercice dans la bibliothèque ?`)){
      saveTimerDuration(sid, exId, mins);
    }
    delete _timerStopped[key];
    const btn=document.getElementById('timer-btn-'+exId);
    if(btn){btn.textContent='⏱';btn.style.borderColor='var(--border2)';btn.style.background='transparent';btn.style.fontSize='16px';btn.style.color='var(--text)';}
    const saveBtn=document.getElementById('timer-save-'+exId);
    if(saveBtn){saveBtn.style.display='none';}
    return;
  }

  // DÉMARRER le timer
  const totalSec=(dureeMin||0)*60;
  let elapsed=0;
  const btn=document.getElementById('timer-btn-'+exId);
  if(btn){btn.style.borderColor='var(--blue)';btn.style.background='rgba(29,78,216,.1)';btn.style.fontSize='11px';btn.style.fontWeight='700';btn.style.color='var(--blue)';}
  _timerState[key]={
    elapsed:0,
    interval:setInterval(()=>{
      elapsed++;
      _timerState[key].elapsed=elapsed;
      const rem=totalSec>0?Math.max(0,totalSec-elapsed):elapsed;
      const m=Math.floor(rem/60),sc=rem%60;
      const label=totalSec>0?(rem<=0?'✅':`${m}:${sc.toString().padStart(2,'0')}`):`${m}:${sc.toString().padStart(2,'0')}`;
      const b=document.getElementById('timer-btn-'+exId);
      if(b){
        b.textContent=label;
        if(totalSec>0&&rem<=0){b.style.borderColor='#2DB87A';b.style.background='rgba(45,184,122,.1)';b.style.color='#2DB87A';}
      }
      if(totalSec>0&&elapsed>=totalSec){
        // Fin automatique → garde affiché
        clearInterval(_timerState[key].interval);
        const fin=_timerState[key].elapsed;
        delete _timerState[key];
        _timerStopped[key]={elapsed:fin,label:'✅'};
        const saveBtn=document.getElementById('timer-save-'+exId);
        if(saveBtn){saveBtn.style.display='';}
      }
    },1000)
  };
}

function saveTimerDuration(sid, exId, mins){
  // Mise à jour durée dans la séance
  S.sessions=S.sessions.map(s=>s.id===sid?{...s,exercises:s.exercises.map(ex=>ex.id===exId?{...ex,duree:mins}:ex)}:s);
  // Mise à jour ou création dans la bibliothèque
  const ses=S.sessions.find(s=>s.id===sid);
  const ex=ses?.exercises.find(e=>e.id===exId);
  if(ex){
    const already=S.library.find(l=>l.name.trim().toLowerCase()===ex.name.trim().toLowerCase());
    if(already){
      S.library=S.library.map(l=>l.id===already.id?{...l,duree:mins}:l);
    }
  }
  save();R();
}

function saveExToLib(sid, exId){
  const ses=S.sessions.find(s=>s.id===sid);if(!ses) return;
  const ex=ses.exercises.find(e=>e.id===exId);if(!ex) return;
  // Vérifie si déjà en biblio (même nom) → met à jour la durée
  const already=S.library.find(l=>l.name.trim().toLowerCase()===ex.name.trim().toLowerCase());
  if(already){
    if(ex.duree&&ex.duree>0){
      S.library=S.library.map(l=>l.id===already.id?{...l,duree:ex.duree}:l);
      save();
      const btn=document.querySelector(`[onclick*="saveExToLib(${sid},${exId})"]`);
      if(btn){btn.textContent='⏱✅';btn.style.color='#2DB87A';setTimeout(()=>{btn.textContent='📚';btn.style.color='var(--text3)';},1500);}
    } else {
      if(!confirm(`"${ex.name}" existe déjà en bibliothèque. Ajouter quand même ?`)) return;
      const newId=S.nLId++;
      S.library.push({id:newId,name:ex.name,phase:ses.phase||'ppg',sets:ex.sets||0,reps:ex.reps||'',notes:ex.notes||'',videoUrl:ex.videoUrl||'',duree:ex.duree||0});
      if(S.imgs[ex.id]) S.imgs['lib_'+newId]=S.imgs[ex.id];
      save();
    }
    return;
  }
  const newId=S.nLId++;
  S.library.push({id:newId,name:ex.name,phase:ses.phase||'ppg',sets:ex.sets||0,reps:ex.reps||'',notes:ex.notes||'',videoUrl:ex.videoUrl||'',duree:ex.duree||0});
  if(S.imgs[ex.id]) S.imgs['lib_'+newId]=S.imgs[ex.id];
  save();
  const btn=document.querySelector(`[onclick*="saveExToLib(${sid},${exId})"]`);
  if(btn){btn.textContent='✅';btn.style.color='#2DB87A';setTimeout(()=>{btn.textContent='📚';btn.style.color='var(--text3)';},1500);}
}
function allToLib(sid){
  const ses=S.sessions.find(s=>s.id===sid);if(!ses||ses.exercises.length===0) return;
  const dupes=ses.exercises.filter(ex=>S.library.find(l=>l.name.trim().toLowerCase()===ex.name.trim().toLowerCase()));
  const msg=dupes.length>0
    ?`Envoyer les ${ses.exercises.length} exercice(s) en bibliothèque ?\n(${dupes.length} existant(s) auront leur durée mise à jour : ${dupes.map(e=>e.name).join(', ')})`
    :`Envoyer les ${ses.exercises.length} exercice(s) en bibliothèque ?`;
  if(!confirm(msg)) return;
  ses.exercises.forEach(ex=>{
    const already=S.library.find(l=>l.name.trim().toLowerCase()===ex.name.trim().toLowerCase());
    if(already){
      // Met à jour la durée si disponible
      if(ex.duree&&ex.duree>0) S.library=S.library.map(l=>l.id===already.id?{...l,duree:ex.duree}:l);
    } else {
      const newId=S.nLId++;
      S.library.push({id:newId,name:ex.name,phase:ses.phase||'ppg',sets:ex.sets||0,reps:ex.reps||'',notes:ex.notes||'',videoUrl:ex.videoUrl||'',duree:ex.duree||0});
      if(S.imgs[ex.id]) S.imgs['lib_'+newId]=S.imgs[ex.id];
    }
  });
  save();R();
}

function dragEx(event, sid, exId){

}
function dropEx(event, sid, targetExId){
  event.preventDefault();
  event.stopPropagation();
  try{
    const data=JSON.parse(event.dataTransfer.getData('text/plain'));
    if(data.type!=='ex'||data.sid!==sid) return;
    if(data.exId===targetExId) return;
    const s=S.sessions.find(x=>x.id===sid);if(!s) return;
    const fromIdx=s.exercises.findIndex(e=>e.id===data.exId);
    const toIdx=s.exercises.findIndex(e=>e.id===targetExId);
    if(fromIdx<0||toIdx<0) return;
    const exes=[...s.exercises];
    const [moved]=exes.splice(fromIdx,1);
    exes.splice(toIdx,0,moved);
    S.sessions=S.sessions.map(x=>x.id===sid?{...x,exercises:exes}:x);
    save();R();
  }catch(e){}
}

function calcUpdate(){
  S.mData.calcAthl=document.getElementById('calc-athl')?.value||'';
  S.mData.calcL=parseInt(document.getElementById('calc-l')?.value||193);
  S.mData.calcF=parseInt(document.getElementById('calc-f')?.value||5);
  S.mData.calcA=parseInt(document.getElementById('calc-a')?.value||30);
  S.mData.calcX=parseInt(document.getElementById('calc-x')?.value||91);
  S.mData.calcY=parseInt(document.getElementById('calc-y')?.value||30);
  // Re-render only the calc content without full R() to avoid losing focus
  const el=document.getElementById('calc-result');
  if(el){
    const f=S.mData.calcF,l=S.mData.calcL,a=S.mData.calcA,x=S.mData.calcX,y=S.mData.calcY;
    const rayon=l*f/(a*Math.PI/180);
    const xi=Math.round((x+rayon*(Math.sin(a*Math.PI/180)))*10)/10;
    const yi=Math.round((y+rayon*(1-Math.cos(a*Math.PI/180)))*10)/10;
    el.innerHTML=xi+' cm';
    const el2=document.getElementById('calc-result-y');
    if(el2) el2.innerHTML=yi+' cm';
    const el3=document.getElementById('calc-result-r');
    if(el3) el3.innerHTML=Math.round(rayon)+' cm';
    const el4=document.getElementById('calc-result-arc');
    if(el4) el4.innerHTML=(l*f)+' cm';
    const el5=document.getElementById('calc-result-name');
    if(el5) el5.innerHTML=S.mData.calcAthl?'&#8212; '+S.mData.calcAthl:'';
    // update displayed slider values
    const lv=document.getElementById('calc-l-val');if(lv)lv.innerHTML=l+' cm';
    const fv=document.getElementById('calc-f-val');if(fv)fv.innerHTML=f+' foulées';
    const av=document.getElementById('calc-a-val');if(av)av.innerHTML=a+'°';
    // update step values in how-to
    const sx=document.getElementById('calc-step-x');if(sx)sx.innerHTML=xi+' cm';
    const sy=document.getElementById('calc-step-y');if(sy)sy.innerHTML=yi+' cm';
  } else {
    R();
  }
}

// ── EXPORT EXCEL ─────────────────────────────────────────────────
async function generateXlsx(){
  const btn=document.getElementById('btn-gen-xlsx');
  if(btn){btn.disabled=true;btn.textContent='⏳ Génération...';}
  if(!window.XLSX){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
  }
  const wb=XLSX.utils.book_new();
  const PHL={ppg:'PPG',ppo:'PPO',pps:'PPS',comp:'Compét',rest:'Repos','':'—'};
  const PHFULL={ppg:'Prépa Physique Générale',ppo:'Prépa Physique Orientée',pps:'Prépa Physique Spécifique',comp:'Compétition',rest:'Récupération'};
  const J=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const sm=new Date('2025-09-01');const dw=sm.getDay();sm.setDate(sm.getDate()+(dw===0?-6:1-dw));
  const fmt=d=>d.toLocaleDateString('fr-BE',{day:'2-digit',month:'short'});

  // Saison
  const sd=[['⬆ Saut en hauteur — Planning de saison 2026–2027','','','','','','','','','','','','']];
  sd.push(['S#','Période','Phase','Séances',...J,'Objectifs']);
  WPLAN.forEach((wp,wi)=>{
    const m=new Date(sm);m.setDate(sm.getDate()+wi*7);
    const s2=new Date(m);s2.setDate(m.getDate()+6);
    sd.push([`S${wi+1}`,`${fmt(m)} – ${fmt(s2)}`,PHL[wp.p]||'—',wp.s.length||0,...J.map((_,i)=>wp.s.includes(i+1)?'✓':''),wp.n]);
  });
  const ws1=XLSX.utils.aoa_to_sheet(sd);
  ws1['!cols']=[{wch:5},{wch:18},{wch:9},{wch:8},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:35}];
  ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:12}}];
  XLSX.utils.book_append_sheet(wb,ws1,'Saison');

  // Feuilles par phase
  ['ppg','ppo','pps','comp'].forEach(ph=>{
    const data=[[`Phase ${PHL[ph]} — ${PHFULL[ph]}`,'','','','','','','','','','']];
    data.push(['S#','Période','Jours',...J,'Objectifs']);
    WPLAN.forEach((wp,wi)=>{
      if(wp.p!==ph) return;
      const m=new Date(sm);m.setDate(sm.getDate()+wi*7);
      const s2=new Date(m);s2.setDate(m.getDate()+6);
      data.push([`S${wi+1}`,`${fmt(m)} – ${fmt(s2)}`,wp.s.length,...J.map((_,i)=>wp.s.includes(i+1)?'✓':''),wp.n]);
    });
    const twk=WPLAN.filter(w=>w.p===ph).length;
    const tse=WPLAN.filter(w=>w.p===ph).reduce((a,w)=>a+w.s.length,0);
    data.push([`Total : ${twk} semaines`,`${tse} séances entraînement`,'','','','','','','','','']);
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:5},{wch:18},{wch:8},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:35}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:10}}];
    XLSX.utils.book_append_sheet(wb,ws,PHL[ph]);
  });

  // Stats
  const tw=WPLAN.length;
  const ss=[['⬆ Statistiques de charge — Saison 2026–2027','','','','']];
  ss.push(['Phase','Semaines','% saison','Jours entraînement','Description']);
  ['ppg','ppo','pps','comp','rest'].forEach(ph=>{
    const wk=WPLAN.filter(w=>w.p===ph).length;
    const dy=WPLAN.filter(w=>w.p===ph).reduce((a,w)=>a+w.s.length,0);
    ss.push([PHL[ph],wk,`${Math.round(wk/tw*100)}%`,dy,PHFULL[ph]||'']);
  });
  ss.push(['Total',tw,'100%',WPLAN.reduce((a,w)=>a+w.s.length,0),'']);
  const ws3=XLSX.utils.aoa_to_sheet(ss);
  ws3['!cols']=[{wch:10},{wch:10},{wch:10},{wch:18},{wch:30}];
  ws3['!merges']=[{s:{r:0,c:0},e:{r:0,c:4}}];
  XLSX.utils.book_append_sheet(wb,ws3,'Stats');

  XLSX.writeFile(wb,'Planning_Hauteur_2026-2027.xlsx');
  if(btn){btn.disabled=false;btn.textContent='📊 Télécharger Planning Excel';}
}

// ── PDF FICHE ATHLÈTE ─────────────────────────────────────────────
async function generateAthletePdf(){
  const selId=S.mData.ficheAtId;
  const at=S.athletes.find(a=>a.id===selId);
  if(!at) return;
  const btn=document.getElementById('btn-gen-pdf');
  if(btn){btn.disabled=true;btn.textContent='⏳ Génération...';}
  if(!window.jspdf){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
  }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=18,cW=W-M*2;let y=M;
  const COL={ppg:[67,56,202],ppo:[21,128,61],pps:[194,65,12],comp:[180,83,9],rest:[75,85,99],blue:[29,78,216],text:[18,19,26],t2:[56,56,72],t3:[104,104,128],bg:[232,234,240],white:[255,255,255]};
  const PHL2={ppg:'PPG',ppo:'PPO',pps:'PPS',comp:'Compet',rest:'Repos'};
  const sesSorted=[...S.sessions].sort((a,b)=>a.date.localeCompare(b.date));
  const byPh={ppg:0,ppo:0,pps:0,comp:0,rest:0};
  sesSorted.forEach(s=>{if(byPh[s.phase]!==undefined) byPh[s.phase]++;});
  function sf(sz,style,col){doc.setFontSize(sz);doc.setFont('helvetica',style||'normal');if(col) doc.setTextColor(...col);else doc.setTextColor(...COL.text);}
  function fr(x,fy,w,h,col){doc.setFillColor(...col);doc.roundedRect(x,fy,w,h,2,2,'F');}

  y=36;
  fr(M,y,cW,22,[240,242,248]);doc.setDrawColor(...COL.bg);doc.setLineWidth(0.3);doc.roundedRect(M,y,cW,22,3,3,'D');

  sf(8,'normal',COL.t3);doc.text('Discipline : Saut en hauteur',M+24,y+19);y+=28;
  const bw2=(cW-9)/4;
  [{v:sesSorted.length,l:'Seances',c:COL.blue},{v:byPh.ppg,l:'PPG',c:COL.ppg},{v:byPh.ppo,l:'PPO',c:COL.ppo},{v:byPh.pps+byPh.comp,l:'PPS/Compet',c:COL.pps}].forEach((st,i)=>{

// ── LOGIQUE VIDÉO ────────────────────────────────────────────────
let vidState={
  stream:null, recorder:null, chunks:[],
  currentBlob:null, currentUrl:null, currentTitle:'', annotColor:'#ff4444',
  annotTool:'arrow', isAnnotating:false, isDrawing:false, drawStart:{x:0,y:0},
  annotations:[], history:[]
};

function bindVideo(){
  // Import fichier
  const fileInput=document.getElementById('vid-file-input');
  const dropZone=document.getElementById('vid-drop-zone');
  if(fileInput) fileInput.addEventListener('change',e=>{if(e.target.files[0]) loadVideoFile(e.target.files[0]);});
  if(dropZone){
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor='var(--blue)';dropZone.style.background='#DDEAFF';});
    dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor='';dropZone.style.background='';});
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.style.borderColor='';dropZone.style.background='';if(e.dataTransfer.files[0]) loadVideoFile(e.dataTransfer.files[0]);});
    dropZone.addEventListener('click',()=>fileInput&&fileInput.click());
  }

  // Enregistrement
  const btnStart=document.getElementById('btn-start-rec');
  const btnStop=document.getElementById('btn-stop-rec');
  if(btnStart) btnStart.addEventListener('click',startRecording);
  if(btnStop) btnStop.addEventListener('click',stopRecording);

  // Lecteur vidéo
  const player=document.getElementById('vid-player');
  if(player){
    player.addEventListener('timeupdate',updateSeekBar);
    player.addEventListener('loadedmetadata',updateSeekBar);
    player.addEventListener('ended',()=>{const b=document.getElementById('btn-play-pause');if(b) b.textContent='▶';});
  }
  const btnPP=document.getElementById('btn-play-pause');
  if(btnPP) btnPP.addEventListener('click',()=>{if(!player) return;if(player.paused){player.play();btnPP.textContent='⏸';}else{player.pause();btnPP.textContent='▶';}});
  const seekBar=document.getElementById('vid-seek');
  if(seekBar) seekBar.addEventListener('input',()=>{if(player&&player.duration) player.currentTime=player.duration*(seekBar.value/100);});

  // Frame by frame
  const fbk=document.getElementById('btn-frame-back');
  const ffw=document.getElementById('btn-frame-fwd');
  if(fbk) fbk.addEventListener('click',()=>{if(player){player.pause();player.currentTime=Math.max(0,player.currentTime-1/30);const b=document.getElementById('btn-play-pause');if(b)b.textContent='▶';}});
  if(ffw) ffw.addEventListener('click',()=>{if(player){player.pause();player.currentTime=Math.min(player.duration||0,player.currentTime+1/30);const b=document.getElementById('btn-play-pause');if(b)b.textContent='▶';}});

  // Vitesse
  document.querySelectorAll('.speed-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const spd=parseFloat(btn.dataset.speed);
      if(player) player.playbackRate=spd;
      document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('btn-p'));
      btn.classList.add('btn-p');
    });
  });

  // Annotation toggle
  const btnAnnot=document.getElementById('btn-toggle-annot');
  if(btnAnnot) btnAnnot.addEventListener('click',()=>{
    const tools=document.getElementById('vid-annot-tools');
    const canvas=document.getElementById('vid-annot-canvas');
    vidState.isAnnotating=!vidState.isAnnotating;
    if(tools) tools.style.display=vidState.isAnnotating?'block':'none';
    if(canvas) canvas.style.display=vidState.isAnnotating?'block':'none';
    btnAnnot.textContent=vidState.isAnnotating?'✏️ Fermer annotation':'✏️ Annoter';
    if(vidState.isAnnotating) syncCanvasSize();
  });

  // Outils annotation
  document.querySelectorAll('.annot-tool').forEach(btn=>{
    btn.addEventListener('click',()=>{
      vidState.annotTool=btn.dataset.tool;
      document.querySelectorAll('.annot-tool').forEach(b=>b.classList.remove('on','btn-p'));
      btn.classList.add('on');
    });
  });
  document.querySelectorAll('[data-annot-color]').forEach(el=>{
    el.addEventListener('click',()=>{
      vidState.annotColor=el.dataset.annotColor;
      document.querySelectorAll('[data-annot-color]').forEach(e=>e.style.border='2px solid transparent');
      el.style.border='2px solid white';
    });
  });
  const btnClear=document.getElementById('btn-clear-annot');
  if(btnClear) btnClear.addEventListener('click',()=>{vidState.annotations=[];redrawAnnotations();});

  // Canvas dessin
  const canvas=document.getElementById('vid-annot-canvas');
  if(canvas){
    canvas.addEventListener('mousedown',e=>startDraw(e));
    canvas.addEventListener('mousemove',e=>moveDraw(e));
    canvas.addEventListener('mouseup',e=>endDraw(e));
    canvas.addEventListener('touchstart',e=>{e.preventDefault();startDraw(e.touches[0]);},{passive:false});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();moveDraw(e.touches[0]);},{passive:false});
    canvas.addEventListener('touchend',e=>{e.preventDefault();endDraw(e.changedTouches[0]);},{passive:false});
  }

  // Export
  const btnExp=document.getElementById('btn-export-vid');
  if(btnExp) btnExp.addEventListener('click',exportVideo);
}

function syncCanvasSize(){
  const canvas=document.getElementById('vid-annot-canvas');
  const player=document.getElementById('vid-player');
  if(canvas&&player){canvas.width=player.offsetWidth;canvas.height=player.offsetHeight;redrawAnnotations();}
}

function canvasPos(e){
  const canvas=document.getElementById('vid-annot-canvas');
  if(!canvas) return{x:0,y:0};
  const r=canvas.getBoundingClientRect();
  return{x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)};
}

function startDraw(e){
  if(!vidState.isAnnotating) return;
  const player=document.getElementById('vid-player');
  if(player) player.pause();
  const b=document.getElementById('btn-play-pause');if(b)b.textContent='▶';
  vidState.isDrawing=true;
  vidState.drawStart=canvasPos(e);
  if(vidState.annotTool==='text'){
    const txt=prompt('Texte à afficher :');
    if(txt){vidState.annotations.push({type:'text',x:vidState.drawStart.x,y:vidState.drawStart.y,text:txt,color:vidState.annotColor});}
    vidState.isDrawing=false;
    redrawAnnotations();
  }
}
function moveDraw(e){
  if(!vidState.isDrawing||vidState.annotTool==='text') return;
  const pos=canvasPos(e);
  redrawAnnotations();
  const canvas=document.getElementById('vid-annot-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  drawShape(ctx,vidState.annotTool,vidState.drawStart,pos,vidState.annotColor,true);
}
function endDraw(e){
  if(!vidState.isDrawing||vidState.annotTool==='text') return;
  vidState.isDrawing=false;
  const pos=canvasPos(e);
  vidState.annotations.push({type:vidState.annotTool,x1:vidState.drawStart.x,y1:vidState.drawStart.y,x2:pos.x,y2:pos.y,color:vidState.annotColor});
  redrawAnnotations();
}
function drawShape(ctx,type,s,e,color,preview){
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=preview?2:2.5;ctx.lineCap='round';
  if(type==='line'){ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(e.x,e.y);ctx.stroke();}
  else if(type==='circle'){const r=Math.sqrt(Math.pow(e.x-s.x,2)+Math.pow(e.y-s.y,2));ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);ctx.stroke();}
  else if(type==='arrow'){
    const dx=e.x-s.x,dy=e.y-s.y,len=Math.sqrt(dx*dx+dy*dy);
    if(len<5) return;
    const ux=dx/len,uy=dy/len,hs=14;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(e.x,e.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(e.x-hs*(ux-uy*0.5),e.y-hs*(uy+ux*0.5));ctx.lineTo(e.x-hs*(ux+uy*0.5),e.y-hs*(uy-ux*0.5));ctx.closePath();ctx.fill();
  }
}
function redrawAnnotations(){
  const canvas=document.getElementById('vid-annot-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  vidState.annotations.forEach(a=>{
    if(a.type==='text'){ctx.font='bold 16px Inter,sans-serif';ctx.fillStyle=a.color;ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=3;ctx.strokeText(a.text,a.x,a.y);ctx.fillText(a.text,a.x,a.y);}
    else drawShape(ctx,a.type,{x:a.x1,y:a.y1},{x:a.x2,y:a.y2},a.color,false);
  });
}

function updateSeekBar(){
  const player=document.getElementById('vid-player');
  const seekBar=document.getElementById('vid-seek');
  const timeSpan=document.getElementById('vid-time');
  if(!player) return;
  if(seekBar&&player.duration) seekBar.value=(player.currentTime/player.duration)*100;
  if(timeSpan){
    const fmt=t=>{const m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s;};
    timeSpan.textContent=fmt(player.currentTime)+' / '+fmt(player.duration||0);
  }
}

function showPlayer(blob,title,meta){
  if(vidState.currentUrl) URL.revokeObjectURL(vidState.currentUrl);
  vidState.currentBlob=blob;
  vidState.currentUrl=URL.createObjectURL(blob);
  vidState.currentTitle=title;
  vidState.annotations=[];
  const card=document.getElementById('vid-player-card');
  if(card) card.style.display='block';
  const player=document.getElementById('vid-player');
  if(player){player.src=vidState.currentUrl;player.load();}
  const t=document.getElementById('vid-player-title');if(t) t.textContent=title;
  const m=document.getElementById('vid-player-meta');if(m) m.textContent=meta;
  const btn=document.getElementById('btn-play-pause');if(btn) btn.textContent='▶';
  redrawAnnotations();
  card.scrollIntoView({behavior:'smooth',block:'start'});
  addToHistory(title,meta,blob);
}

function addToHistory(title,meta,blob){
  const id='v_'+Date.now();
  vidState.history.unshift({id,title,meta,blob});
  const list=document.getElementById('vid-history-list');
  if(!list) return;
  list.innerHTML=vidState.history.map(v=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);margin-bottom:8px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">${v.title}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${v.meta}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" style="font-size:12px;padding:5px 10px" onclick="reloadHistoryVid('${v.id}')">▶ Revoir</button>
        <button class="btn btn-p" style="font-size:12px;padding:5px 10px" onclick="downloadHistoryVid('${v.id}')">⬇</button>
      </div>
    </div>`).join('');
}

function reloadHistoryVid(id){
  const v=vidState.history.find(x=>x.id===id);
  if(v) showPlayer(v.blob,v.title,v.meta);
}
function downloadHistoryVid(id){
  const v=vidState.history.find(x=>x.id===id);
  if(!v) return;
  const url=URL.createObjectURL(v.blob);
  const a=document.createElement('a');a.href=url;
  a.download=sanitizeFilename(v.title)+'.webm';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

function sanitizeFilename(name){
  const at=document.getElementById('vid-at')?.value||document.getElementById('vid-at2')?.value||'';
  const athlete=at?S.athletes.find(a=>a.id==at):null;
  const prefix=athlete?athlete.prenom+'_'+athlete.nom+'_':'';
  const date=new Date().toISOString().slice(0,10);
  const label=(name||'video').replace(/[^a-zA-Z0-9_\-éèàùâêîôûäëïöü ]/g,'').replace(/\s+/g,'_');
  return prefix+date+'_'+label;
}

function loadVideoFile(file){
  const label=document.getElementById('vid-label2')?.value||file.name.replace(/\.[^.]+$/,'');
  const atId=document.getElementById('vid-at2')?.value||'';
  const athlete=atId?S.athletes.find(a=>a.id==atId):null;
  const meta=(athlete?athlete.prenom+' '+athlete.nom+' · ':'')+new Date().toLocaleDateString('fr-BE',{day:'2-digit',month:'short',year:'numeric'})+' · Importé';
  showPlayer(file,label||'Vidéo importée',meta);
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
    vidState.stream=stream;
    const preview=document.getElementById('vid-preview');
    if(preview){preview.srcObject=stream;preview.style.display='block';}
    const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
    vidState.recorder=new MediaRecorder(stream,{mimeType});
    vidState.chunks=[];
    vidState.recorder.ondataavailable=e=>{if(e.data.size>0) vidState.chunks.push(e.data);};
    vidState.recorder.onstop=()=>{
      const blob=new Blob(vidState.chunks,{type:'video/webm'});
      const label=document.getElementById('vid-label')?.value||'Analyse';
      const atId=document.getElementById('vid-at')?.value||'';
      const athlete=atId?S.athletes.find(a=>a.id==atId):null;
      const meta=(athlete?athlete.prenom+' '+athlete.nom+' · ':'')+new Date().toLocaleDateString('fr-BE',{day:'2-digit',month:'short',year:'numeric'})+' · Enregistré';
      if(preview){preview.srcObject=null;preview.style.display='none';}
      if(vidState.stream){vidState.stream.getTracks().forEach(t=>t.stop());vidState.stream=null;}
      document.getElementById('btn-start-rec').style.display='';
      document.getElementById('btn-stop-rec').style.display='none';
      showPlayer(blob,label,meta);
    };
    vidState.recorder.start(100);
    document.getElementById('btn-start-rec').style.display='none';
    document.getElementById('btn-stop-rec').style.display='';
    // Auto-stop après 40s
    setTimeout(()=>{if(vidState.recorder&&vidState.recorder.state!=='inactive') stopRecording();},40000);
  }catch(err){alert('Impossible d\'accéder à la caméra : '+err.message);}
}

function stopRecording(){
  if(vidState.recorder&&vidState.recorder.state!=='inactive') vidState.recorder.stop();
}

function exportVideo(){
  if(!vidState.currentBlob) return;
  const at=document.getElementById('vid-at')?.value||document.getElementById('vid-at2')?.value||'';
  const athlete=at?S.athletes.find(a=>a.id==at):null;
  const name=sanitizeFilename(vidState.currentTitle);
  const url=URL.createObjectURL(vidState.currentBlob);
  const a=document.createElement('a');a.href=url;a.download=name+'.webm';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

// ── INIT : charge Firebase si dispo, sinon démarre direct
async function initApp() {
  if (window.fbLoad) {
    try {
      document.getElementById('app').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#E8EAF0">
          <div style="font-size:32px">🔥</div>
          <div style="font-size:16px;font-weight:600;color:#12131A">Connexion Firebase…</div>
          <div style="font-size:13px;color:#686880">Chargement de tes données</div>
        </div>`;
      const fbData = await window.fbLoad();
      if (fbData) {
        // Fusion Firebase → S (Firebase prioritaire)
        if (fbData.athletes)  S.athletes  = fbData.athletes;
        if (fbData.sessions)  S.sessions  = fbData.sessions;
        if (fbData.library)   S.library   = fbData.library;
        if (fbData.dd)        S.dd        = fbData.dd;
        if (fbData.dd2)       S.dd2       = fbData.dd2;
        if (fbData.imgs)      S.imgs      = fbData.imgs;
        if (fbData.docs)      S.docs      = fbData.docs;
        if (fbData.docCats)   S.docCats   = fbData.docCats;
        if (fbData.nDId)      S.nDId      = fbData.nDId;
        if (fbData.nAId)      S.nAId      = fbData.nAId;
        if (fbData.nSId)      S.nSId      = fbData.nSId;
        if (fbData.nEId)      S.nEId      = fbData.nEId;
        if (fbData.nLId)      S.nLId      = fbData.nLId;
        // Sync localStorage aussi
        Object.keys(fbData).forEach(k => { if(k!=='imgs') lsSet('h_'+k.replace(/([A-Z])/g,'$1').toLowerCase(), fbData[k]); });
      }
      window._fbStatus = 'synced';
      // Écoute sync temps réel (autres devices)
      window.fbListen && window.fbListen((data) => {
        if (!data) return;
        let changed = false;
        ['athletes','sessions','library','dd','dd2','docs','docCats','nDId','nAId','nSId','nEId','nLId'].forEach(k => {
          if (data[k] !== undefined && JSON.stringify(S[k]) !== JSON.stringify(data[k])) {
            S[k] = data[k]; changed = true;
          }
        });
        if (changed) R();
      });
    } catch(e) {
      console.warn('Firebase init error:', e);
      window._fbStatus = 'error';
    }
  }
  R();
}

// Démarre dès que Firebase est prêt (ou immédiatement si pas de Firebase)
if (window._fbReady) {
  initApp();
} else {
  document.addEventListener('fbReady', initApp);
  setTimeout(initApp, 3000); // fallback 3s
}
</script>
